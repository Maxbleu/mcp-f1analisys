[build]
builder = "nixpacks"

[deploy]
startCommand        = "python server.py"
healthcheckPath     = "/health"
healthcheckTimeout  = 300
restartPolicyType   = "ON_FAILURE"

[env]
PORT                = "8000"
RAILWAY_ENVIRONMENT = "production"

[[services]]
name   = "mcp_f1analisys"
source = "."
