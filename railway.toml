[build]
builder = "nixpacks"

[deploy]
startCommand        = "uvicorn mcp_f1analisys.main:app --host 0.0.0.0 --port ${PORT}"
healthcheckPath     = "/health"
healthcheckTimeout  = 300
restartPolicyType   = "ON_FAILURE"

[env]
PORT                = "8000"
RAILWAY_ENVIRONMENT = "production"

[[services]]
name   = "mcp_f1analisys"
source = "."
